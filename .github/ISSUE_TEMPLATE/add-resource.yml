name: Add Resource
description: Submit a new embodied AI resource
title: "[Resource] "
labels: ["resource"]
body:
  - type: input
    id: name
    attributes:
      label: Resource name
      placeholder: OpenVLA
    validations:
      required: true
  - type: input
    id: link
    attributes:
      label: Link
      placeholder: https://github.com/openvla/openvla
    validations:
      required: true
  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - Paper
        - Code
        - Dataset
        - Course
        - Simulation
        - Robot Platform
        - Other
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Why it matters
      description: Explain why this resource is useful.
    validations:
      required: true
